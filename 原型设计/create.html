<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1152d4",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>AI 故事创作</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-md mx-auto bg-white dark:bg-slate-900 min-h-screen flex flex-col shadow-xl">
<!-- Header -->
<header class="flex items-center p-4 border-b border-slate-100 dark:border-slate-800 sticky top-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md z-10">
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined block">arrow_back</span>
</button>
<h1 class="text-lg font-bold flex-1 text-center mr-10">开始创作</h1>
</header>
<main class="flex-1 overflow-y-auto pb-24">
<!-- Progress Indicator -->
<div class="flex items-center justify-between px-10 py-8">
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-bold">1</div>
<span class="text-xs font-medium text-primary">构思</span>
</div>
<div class="h-[2px] flex-1 bg-primary/20 mx-2 -mt-6"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary/20 text-primary flex items-center justify-center font-bold">2</div>
<span class="text-xs font-medium text-slate-400">大纲</span>
</div>
<div class="h-[2px] flex-1 bg-slate-100 dark:bg-slate-800 mx-2 -mt-6"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-400 flex items-center justify-center font-bold">3</div>
<span class="text-xs font-medium text-slate-400">插画</span>
</div>
</div>
<!-- Step 1 Content -->
<section class="px-4 space-y-6">
<div>
<h2 class="text-2xl font-bold tracking-tight">第1步：构思你的故事</h2>
<p class="text-slate-500 text-sm mt-1">告诉 AI 你想写什么样的故事，我们会为你细化细节。</p>
</div>
<div class="space-y-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 px-1">故事主题 / 梗概</label>
<textarea class="w-full min-h-[160px] p-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-base" placeholder="输入你想创作的故事背景、主题或具体梗概... 例如：一个在赛博朋克城市中寻找遗失记忆的机器猫。"></textarea>
</div>
<button class="w-full py-4 bg-primary text-white rounded-xl font-bold text-lg shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">auto_awesome</span>
                        生成大纲与分镜
                    </button>
</div>
</section>
<!-- Divider -->
<div class="h-4 bg-slate-50 dark:bg-slate-800/50 my-8"></div>
<!-- Step 2 Content (Mocked/Visible State) -->
<section class="px-4 space-y-6">
<div class="flex items-center justify-between">
<h2 class="text-xl font-bold">第2步：确认大纲与分镜</h2>
<span class="px-2 py-1 bg-primary/10 text-primary text-[10px] font-bold rounded uppercase">草稿生成</span>
</div>
<!-- Story Outline Card -->
<div class="p-4 rounded-xl border border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-800 shadow-sm space-y-3">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-xl">description</span>
<h3 class="font-bold">故事大纲</h3>
</div>
<div class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed p-3 bg-slate-50 dark:bg-slate-900 rounded-lg border border-dashed border-slate-200 dark:border-slate-700">
                        在霓虹闪烁的未来城市，一只名叫“零点”的仿生猫在废弃的存储芯片中发现了一段被删除的城市起源代码。它必须躲避安保程序的追捕，将真相带回地下反抗组织...
                    </div>
</div>
<!-- Scenes List -->
<div class="space-y-4">
<div class="flex items-center justify-between px-1">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-xl">movie_edit</span>
<h3 class="font-bold">分镜文案</h3>
</div>
<button class="text-primary text-sm font-medium flex items-center gap-1">
<span class="material-symbols-outlined text-sm">add</span>
                            增加场景
                        </button>
</div>
<!-- Scene Item 1 -->
<div class="group relative p-4 rounded-xl border border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-800 shadow-sm">
<div class="flex justify-between items-start mb-2">
<span class="text-xs font-bold text-slate-400">场景 1</span>
<button class="text-slate-300 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined text-lg">delete</span>
</button>
</div>
<textarea class="w-full bg-transparent border-none p-0 focus:ring-0 text-sm text-slate-700 dark:text-slate-300 resize-none h-auto" rows="2">深蓝色的雨夜，零点穿梭在狭窄的巷弄间，它的机械眼闪烁着幽蓝的光。</textarea>
</div>
<!-- Scene Item 2 -->
<div class="group relative p-4 rounded-xl border border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-800 shadow-sm">
<div class="flex justify-between items-start mb-2">
<span class="text-xs font-bold text-slate-400">场景 2</span>
<button class="text-slate-300 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined text-lg">delete</span>
</button>
</div>
<textarea class="w-full bg-transparent border-none p-0 focus:ring-0 text-sm text-slate-700 dark:text-slate-300 resize-none h-auto" rows="2">在杂乱的电子回收站，它伸出爪子连接了一个古老的控制台。</textarea>
</div>
</div>
<!-- Final Action for Step 3 -->
<div class="pt-4">
<button class="w-full py-4 bg-primary text-white rounded-xl font-bold text-lg shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">palette</span>
                        生成连环画插画
                    </button>
<p class="text-center text-xs text-slate-400 mt-3">生成过程预计需要 30-60 秒，请保持页面开启</p>
</div>
</section>
</main>
<!-- Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto border-t border-slate-100 dark:border-slate-800 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md px-4 py-2 flex justify-around items-center z-20">
<a class="flex flex-col items-center gap-1 text-slate-400 py-1" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">首页</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary py-1" href="#">
<span class="material-symbols-outlined font-fill" style="font-variation-settings: 'FILL' 1">add_circle</span>
<span class="text-[10px] font-medium">创作</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 py-1" href="#">
<span class="material-symbols-outlined">auto_stories</span>
<span class="text-[10px] font-medium">作品</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 py-1" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">我的</span>
</a>
</nav>
</div>
</body></html>
